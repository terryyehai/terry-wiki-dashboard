<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent Wiki — Knowledge Dashboard</title>
<style>
:root {
  --bg: #0d0f14;
  --panel: rgba(255,255,255,0.04);
  --panel-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text: #e8e4df;
  --muted: #7a766f;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.15);
  --teal: #8b9e6e;
  --chip: rgba(255,255,255,0.06);
  --radius: 12px;
  --radius-lg: 18px;
  --font: "SF Pro Display","Noto Sans TC",-apple-system,sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(110,100,180,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(100,160,140,0.06) 0%, transparent 55%);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.65;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,15,20,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex; align-items: center; gap: 0;
  height: 54px;
}
nav .brand {
  font-size: 15px; font-weight: 900;
  color: var(--text); letter-spacing: -.02em;
  display: flex; align-items: center; gap: 8px;
  margin-right: 32px;
}
nav .brand span { font-size: 17px; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  padding: 6px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer; border: none;
  background: none; transition: .15s;
}
.nav-tab:hover { color: var(--text); background: var(--chip); }
.nav-tab.active { color: var(--accent); background: var(--accent-dim); }
.nav-spacer { flex: 1; }
.nav-search-wrap {
  position: relative;
}
.nav-search {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 14px 7px 34px;
  font-size: 13px; font-family: inherit;
  color: var(--text); width: 220px;
  outline: none; transition: border-color .2s, width .2s;
}
.nav-search:focus { border-color: var(--accent); width: 280px; }
.nav-search::placeholder { color: var(--muted); }
.nav-search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 13px; pointer-events: none;
}

/* ── HERO ── */
.hero {
  max-width: 1200px; margin: 0 auto;
  padding: 64px 28px 48px;
}
.hero h1 {
  font-size: clamp(28px,4vw,46px); font-weight: 900;
  letter-spacing: -.03em; line-height: 1.15;
  margin-bottom: 12px;
  background: linear-gradient(135deg,#e8e4df 0%,#c8a96e 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 16px; color: var(--muted); max-width: 540px; margin-bottom: 32px; }
.hero-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.hero-stat {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 22px;
  display: flex; align-items: center; gap: 12px;
}
.hero-stat .num { font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1; }
.hero-stat .label { font-size: 12px; color: var(--muted); font-weight: 600; }
.hero-stat .sep { width: 1px; height: 28px; background: var(--border); }

/* ── SECTION ── */
.section {
  max-width: 1200px; margin: 0 auto;
  padding: 0 28px 56px;
}
.section-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
}
.section-title { font-size: 20px; font-weight: 900; letter-spacing: -.02em; }
.section-count {
  font-size: 11px; color: var(--muted);
  background: var(--chip); padding: 3px 9px;
  border-radius: 999px; font-weight: 600;
}

/* ── FILTER CHIPS ── */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.filter-chip {
  padding: 5px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 700;
  border: 1px solid var(--border);
  background: var(--panel); color: var(--muted);
  cursor: pointer; transition: .15s;
  letter-spacing: .02em;
}
.filter-chip:hover { border-color: var(--border-strong); color: var(--text); }
.filter-chip.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── PERSPECTIVE CARDS ── */
.perspective-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.p-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: border-color .2s, background .2s, transform .15s;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.p-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.p-card[data-domain="投資"]::before { background: linear-gradient(90deg,#c8a96e,#e8c87a); }
.p-card[data-domain="AI/科技"]::before { background: linear-gradient(90deg,#6e8bc8,#8baad4); }
.p-card[data-domain="內容創作"]::before { background: linear-gradient(90deg,#9b7ec8,#b89ed4); }
.p-card[data-domain="政治/商業"]::before { background: linear-gradient(90deg,#c47070,#d48a8a); }
.p-card[data-domain="其他"]::before { background: linear-gradient(90deg,#7a766f,#9a968f); }

.p-card:hover {
  border-color: var(--border-strong);
  background: var(--panel-hover);
  transform: translateY(-1px);
}
.p-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.p-domain {
  font-size: 9px; font-weight: 900; letter-spacing: .1em;
  text-transform: uppercase; padding: 3px 8px;
  border-radius: 6px; flex-shrink: 0; margin-top: 2px;
}
.p-domain.投資 { background: rgba(200,169,110,0.18); color: #c8a96e; }
.p-domain.AI-科技 { background: rgba(110,139,200,0.18); color: #8aacd4; }
.p-domain.內容創作 { background: rgba(155,126,200,0.18); color: #b89ed4; }
.p-domain.政治-商業 { background: rgba(196,112,112,0.18); color: #d48a8a; }
.p-domain.其他 { background: rgba(122,118,111,0.18); color: #9a968f; }
.p-name { font-size: 15px; font-weight: 900; color: var(--text); line-height: 1.3; }
.p-tagline {
  font-size: 13px; font-weight: 700;
  color: var(--accent); margin-bottom: 8px;
  line-height: 1.4;
}
.p-desc { font-size: 12px; color: var(--muted); line-height: 1.7; }
.p-trigger {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
  line-height: 1.5;
}
.p-trigger span { color: var(--accent); font-weight: 600; }

/* ── SKILL CARDS ── */
.skill-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.s-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color .2s, background .2s;
  display: flex; flex-direction: column; gap: 6px;
}
.s-card:hover { border-color: var(--border-strong); background: var(--panel-hover); }
.s-card-header { display: flex; align-items: center; gap: 8px; }
.s-cat {
  font-size: 9px; font-weight: 900; letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2px 7px; border-radius: 5px;
  background: var(--chip); color: var(--muted);
  flex-shrink: 0;
}
.s-name { font-size: 13px; font-weight: 800; color: var(--text); }
.s-desc { font-size: 12px; color: var(--muted); line-height: 1.6; flex: 1; }
.s-trigger {
  font-size: 11px; color: var(--muted);
  padding: 6px 8px;
  background: rgba(200,169,110,0.07);
  border-radius: 7px;
  line-height: 1.5;
  margin-top: 2px;
}
.s-trigger span { color: var(--accent); font-weight: 600; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 48px 0;
  color: var(--muted); font-size: 14px;
}
.empty-state .emo { font-size: 32px; margin-bottom: 12px; display: block; }

/* ── SECTION DIVIDER ── */
.divider {
  border: none; border-top: 1px solid var(--border);
  margin: 0 0 0 0;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 24px 28px;
  text-align: center;
  font-size: 12px; color: var(--muted);
  max-width: 1200px; margin: 0 auto;
}

/* ── UTIL ── */
.hidden { display: none !important; }
.tag-AI { color: #8aacd4; }
.tag-內容 { color: #b89ed4; }
.tag-投資 { color: #c8a96e; }
.tag-政治 { color: #d48a8a; }
.tag-系統 { color: #7a968f; }
</style>
</head>

// ── STATE ──
let activeTab = 'overview';
let activePerspFilter = '全部';
let activeSkillCat = '全部';
let searchQuery = '';

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  initNavTabs();
  initPerspFilters();
  initSkillCatFilters();
  initNavSearch();
  renderAll();
});

function initNavTabs() {
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      showTab(activeTab);
    });
  });
}

function showTab(tab) {
  document.getElementById('overview').style.display = tab === 'overview' ? 'block' : 'none';
  document.getElementById('perspectives-section').classList.toggle('hidden', tab !== 'perspectives');
  document.getElementById('skills-section').classList.toggle('hidden', tab !== 'skills');
}

function initPerspFilters() {
  document.querySelectorAll('#persp-filters .filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#persp-filters .filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activePerspFilter = chip.dataset.filter;
      renderPerspectives();
    });
  });
}

function initSkillCatFilters() {
  // Build category chips dynamically
  const cats = [...new Set(SKILLS.map(s => s.category))].sort();
  const container = document.getElementById('skill-cat-filters');
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.dataset.filter = '全部';
  allChip.textContent = '全部';
  allChip.addEventListener('click', () => {
    document.querySelectorAll('#skill-cat-filters .filter-chip').forEach(c => c.classList.remove('active'));
    allChip.classList.add('active');
    activeSkillCat = '全部';
    renderSkills();
  });
  container.appendChild(allChip);
  cats.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip';
    chip.dataset.filter = cat;
    chip.textContent = cat;
    chip.addEventListener('click', () => {
      document.querySelectorAll('#skill-cat-filters .filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeSkillCat = cat;
      renderSkills();
    });
    container.appendChild(chip);
  });
}

function initNavSearch() {
  const input = document.getElementById('navSearch');
  input.addEventListener('input', () => {
    searchQuery = input.value.trim().toLowerCase();
    if (searchQuery) {
      // Jump to skills tab and filter
      document.querySelector('[data-tab="skills"]').click();
      activeSkillCat = '全部';
      document.querySelectorAll('#skill-cat-filters .filter-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.filter === '全部');
      });
    }
    renderSkills();
    renderPerspectives();
  });
}

function renderAll() {
  renderPerspectives();
  renderSkills();
}

function getPerspDomainClass(domain) {
  return domain.replace('/','-');
}

function renderPerspectives() {
  const grid = document.getElementById('persp-grid');
  const empty = document.getElementById('persp-empty');
  const count = document.getElementById('persp-count');

  let filtered = PERSPECTIVES;
  if (activePerspFilter !== '全部') {
    filtered = filtered.filter(p => p.domain === activePerspFilter);
  }
  if (searchQuery) {
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(searchQuery) ||
      p.desc.toLowerCase().includes(searchQuery) ||
      p.trigger.toLowerCase().includes(searchQuery) ||
      p.tagline.toLowerCase().includes(searchQuery)
    );
  }

  count.textContent = `${filtered.length} 個`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  grid.innerHTML = filtered.map(p => `
    <div class="p-card" data-domain="${getPerspDomainClass(p.domain)}">
      <div class="p-card-header">
        <span class="p-domain ${getPerspDomainClass(p.domain)}">${p.domain}</span>
      </div>
      <div class="p-name">${p.name.replace('-perspective','')}</div>
      <div class="p-tagline">${p.tagline}</div>
      <div class="p-desc">${p.desc.slice(0, 120)}${p.desc.length > 120 ? '…' : ''}</div>
      ${p.trigger ? `<div class="p-trigger"><span>觸發：</span>${p.trigger.slice(0, 100)}${p.trigger.length > 100 ? '…' : ''}</div>` : ''}
    </div>
  `).join('');
}

function renderSkills() {
  const grid = document.getElementById('skill-grid');
  const empty = document.getElementById('skill-empty');
  const count = document.getElementById('skill-count');

  let filtered = SKILLS;
  if (activeSkillCat !== '全部') {
    filtered = filtered.filter(s => s.category === activeSkillCat);
  }
  if (searchQuery) {
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(searchQuery) ||
      (s.desc && s.desc.toLowerCase().includes(searchQuery)) ||
      (s.trigger && s.trigger.toLowerCase().includes(searchQuery))
    );
  }

  count.textContent = `${filtered.length} 個`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  grid.innerHTML = filtered.map(s => `
    <div class="s-card">
      <div class="s-card-header">
        <span class="s-cat">${s.category}</span>
      </div>
      <div class="s-name">${s.name}</div>
      ${s.desc ? `<div class="s-desc">${s.desc.length > 90 ? s.desc.slice(0,90) + '…' : s.desc}</div>` : ''}
      ${s.trigger ? `<div class="s-trigger"><span>觸發：</span>${s.trigger}</div>` : ''}
    </div>
  `).join('');
}
</script>
